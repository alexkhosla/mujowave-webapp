name: Deploy to GitHub Pages

# Every push to main deploys. Pushing is the publish gate: commit freely,
# push when the change should go live.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # SPA fallback: unknown paths serve the app so Angular routing works.
      - run: cp dist/mujowave-webapp/browser/index.html dist/mujowave-webapp/browser/404.html
      # Real files for known routes so they return HTTP 200 (the Play Console
      # and other link checkers reject a privacy URL that answers 404).
      - run: |
          for r in app hardware beta privacy; do
            mkdir -p "dist/mujowave-webapp/browser/$r"
            cp dist/mujowave-webapp/browser/index.html "dist/mujowave-webapp/browser/$r/index.html"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mujowave-webapp/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
