name: Deploy to GitHub Pages

# Manual deploys only: pushing to main does NOT publish. To put the current
# main live, go to the repo's Actions tab -> "Deploy to GitHub Pages" ->
# "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # SPA fallback: unknown paths serve the app so Angular routing works.
      - run: cp dist/mujowave-webapp/browser/index.html dist/mujowave-webapp/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mujowave-webapp/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
